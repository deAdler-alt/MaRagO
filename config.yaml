data_mode: opdi  # opdi | demo

opdi:
  base_url: "https://www.eurocontrol.int/performance/data/download/OPDI/v002/flight_list/flight_list_{month}.parquet"
  months:
    - "202201"
    - "202202"
    - "202203"
    - "202204"
    - "202205"
    - "202206"
    - "202207"
    - "202208"
    - "202209"
    - "202210"
    - "202211"
    - "202212"
    - "202301"
    - "202302"
    - "202303"
    - "202304"
    - "202305"
    - "202306"
    - "202307"
    - "202308"
    - "202309"
    - "202310"
    - "202311"
    - "202312"
    - "202401"
    - "202402"
    - "202403"
    - "202404"
    - "202405"
    - "202406"
  cache_dir: "data/eurocontrol/cache"

opensky:
  aircraft_db_url: "https://s3.opensky-network.org/data-samples/metadata/aircraftDatabase.csv"
  typecodes:
    - B737
    - B738
    - B739
    - B38M
    - B39M

column_map:
  icao24: icao24
  flight_id: id
  dep_airport: adep
  arr_airport: ades
  dep_time_utc: first_seen
  arr_time_utc: last_seen
  dof: dof

checks:
  a_check: [1, 3]
  b_check: [4, 5]
  c_check: [21, 55]
  d_check_min: 60
  min_gap_hours: 48

mro_hubs:
  - EPWA
  - EDDH
  - LTFM
  - LEMD
  - EIDW
  - EETN
  - LOWW
  - EBBR
  - EPBY

ccheck:
  base_interval_months: 27
  high_utilization_threshold: 80
  high_utilization_adjustment_months: -3
  low_utilization_threshold: 40
  low_utilization_adjustment_months: 3
  contact_window_start_months: 18
  contact_window_end_months: 6
  old_aircraft_years: 12
  old_aircraft_interval_reduction: 0.12

paths:
  processed_dir: data/processed
  flights: data/processed/flights.parquet
  gaps: data/processed/gaps.parquet
  predictions: data/processed/predictions.parquet

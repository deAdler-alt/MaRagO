services:
  pipeline:
    build: .
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
    command: python scripts/run_pipeline.py
    profiles: ["pipeline"]

  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
